name: Release Desktop

# Trigger : tag push v*-portable OR manual via Actions UI
on:
  push:
    tags:
      - 'v*-portable'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the release (ex: v1.0.1-portable)'
        required: true
        default: 'v1.0.1-portable'

permissions:
  contents: write  # créer/upload release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os_name: windows
            pkg_target: node18-win-x64
            triple: x86_64-pc-windows-msvc
            sidecar_ext: '.exe'
            tauri_target: ''
            release_dir: target/release
          - platform: macos-latest
            os_name: macos
            pkg_target: node18-macos-arm64
            triple: aarch64-apple-darwin
            sidecar_ext: ''
            tauri_target: '--target aarch64-apple-darwin'
            release_dir: target/aarch64-apple-darwin/release
          - platform: ubuntu-22.04
            os_name: linux
            pkg_target: node18-linux-x64
            triple: x86_64-unknown-linux-gnu
            sidecar_ext: ''
            tauri_target: ''
            release_dir: target/release

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os_name == 'macos' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ matrix.os_name }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}

      - name: Install Linux deps
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf pkg-config libfuse2

      - name: Install pkg (sidecar bundler)
        run: npm install -g @yao-pkg/pkg

      - name: Install Tauri CLI
        working-directory: apps/desktop
        run: npm install

      - name: Install frontend deps
        working-directory: apps/frontend
        run: npm install

      - name: Install backend deps
        working-directory: apps/backend
        run: npm install

      - name: Build backend bundle (esbuild CJS)
        working-directory: apps/backend
        shell: bash
        run: |
          npm install --save-dev esbuild
          npx esbuild src/server.ts --bundle --platform=node --format=cjs \
            --target=node18 --outfile=dist/bundle.cjs \
            --external:bufferutil --external:utf-8-validate

      - name: Build sidecar binary (pkg)
        working-directory: apps/desktop
        shell: bash
        run: |
          pkg ../backend/dist/bundle.cjs \
            --targets ${{ matrix.pkg_target }} \
            --output src-tauri/binaries/collab-backend-${{ matrix.triple }}
          echo "--- binaries/ après pkg ---"
          ls -lh src-tauri/binaries/

      - name: Build frontend (SvelteKit static)
        working-directory: apps/frontend
        run: npm run build

      # ─── Compilation Rust (cargo build pour tous) ──────────────────────
      - name: Build Tauri app
        working-directory: apps/desktop/src-tauri
        env:
          CARGO_HTTP_CHECK_REVOKE: false
        shell: bash
        run: cargo build --release --features custom-protocol ${{ matrix.tauri_target }}

      # ─── Copie sidecar dans target/release (tous les OS) ──────────────
      - name: Copy sidecar alongside Tauri binary
        shell: bash
        run: |
          SRC="apps/desktop/src-tauri/binaries/collab-backend-${{ matrix.triple }}${{ matrix.sidecar_ext }}"
          DEST="apps/desktop/src-tauri/${{ matrix.release_dir }}/collab-backend${{ matrix.sidecar_ext }}"
          echo "SRC : $SRC"
          ls -lh "$SRC"
          cp "$SRC" "$DEST"
          chmod +x "$DEST" 2>/dev/null || true
          echo "DEST : $DEST"
          ls -lh "$DEST"

      # ─── Linux : AppImage via linuxdeploy (bundle webkit) ─────────────
      - name: Create AppImage (Linux)
        if: matrix.os_name == 'linux'
        shell: bash
        run: |
          RELDIR="$GITHUB_WORKSPACE/apps/desktop/src-tauri/target/release"
          APPDIR="$GITHUB_WORKSPACE/Collab.AppDir"

          # Télécharge linuxdeploy + plugin GTK (no FUSE needed via EXTRACT_AND_RUN)
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-gtk/releases/download/continuous/linuxdeploy-plugin-gtk-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          # Structure AppDir
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          cp "$RELDIR/collab-desktop"  "$APPDIR/usr/bin/collab"
          cp "$RELDIR/collab-backend"  "$APPDIR/usr/bin/"
          chmod +x "$APPDIR/usr/bin/"*

          cp "apps/desktop/src-tauri/icons/128x128.png" \
             "$APPDIR/usr/share/icons/hicolor/256x256/apps/collab.png"

          cat > "$APPDIR/collab.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Collab
          Exec=collab
          Icon=collab
          Type=Application
          Categories=Network;
          Version=1.0
          DESKTOP
          cp "$APPDIR/collab.desktop" "$APPDIR/usr/share/applications/"

          # linuxdeploy bundle toutes les libs dont webkit2gtk
          APPIMAGE_EXTRACT_AND_RUN=1 DEPLOY_GTK_VERSION=3 \
            ./linuxdeploy-x86_64.AppImage \
              --appdir "$APPDIR" \
              --plugin gtk \
              --output appimage

          mv Collab*.AppImage "$GITHUB_WORKSPACE/Collab-linux-x64.AppImage"
          chmod +x "$GITHUB_WORKSPACE/Collab-linux-x64.AppImage"
          ls -lh "$GITHUB_WORKSPACE/Collab-linux-x64.AppImage"

      # ─── Windows : ZIP portable ──────────────────────────────────────
      - name: Pack Windows portable ZIP
        if: matrix.os_name == 'windows'
        shell: pwsh
        working-directory: apps/desktop/src-tauri/target/release
        run: |
          $out = "$env:GITHUB_WORKSPACE/Collab-Portable-x64.zip"
          $src = if (Test-Path "collab-desktop.exe") { "collab-desktop.exe" } else { "Collab.exe" }
          Copy-Item $src "Collab.exe" -Force
          Compress-Archive -Path "Collab.exe","collab-backend.exe" -DestinationPath $out -Force
          Get-Item $out | Format-Table Name, Length

      # ─── macOS : tarball arm64 ─────────────────────────────────────────
      - name: Pack macOS tarball
        if: matrix.os_name == 'macos'
        run: |
          cd apps/desktop/src-tauri/target/aarch64-apple-darwin/release
          cp collab-desktop Collab
          tar -czf "$GITHUB_WORKSPACE/Collab-Portable-macos-arm64.tar.gz" Collab collab-backend
          ls -lh "$GITHUB_WORKSPACE/Collab-Portable-macos-arm64.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: collab-portable-${{ matrix.os_name }}
          path: |
            Collab-Portable-*
            Collab-linux-x64.AppImage
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f \( -name "Collab-Portable-*" -o -name "Collab-linux-x64.AppImage" \)

      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
                 --title "Collab Desktop $TAG" \
                 --notes "Build CI automatique multi-OS (Windows x64, Linux x64, macOS arm64)."
          find artifacts -type f \( -name "Collab-Portable-*" -o -name "Collab-linux-x64.AppImage" \) -print0 \
            | while IFS= read -r -d '' f; do
              gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber
            done
