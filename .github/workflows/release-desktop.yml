name: Release Desktop

# Trigger : tag push v*-portable OR manual via Actions UI
on:
  push:
    tags:
      - 'v*-portable'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the release (ex: v1.0.1-portable)'
        required: true
        default: 'v1.0.1-portable'

permissions:
  contents: write  # créer/upload release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os_name: windows
            pkg_target: node22-win-x64
            triple: x86_64-pc-windows-msvc
            sidecar_ext: '.exe'
            tauri_target: ''
          - platform: macos-latest
            os_name: macos
            pkg_target: node22-macos-arm64
            triple: aarch64-apple-darwin
            sidecar_ext: ''
            tauri_target: '--target aarch64-apple-darwin'
          - platform: ubuntu-22.04
            os_name: linux
            pkg_target: node22-linux-x64
            triple: x86_64-unknown-linux-gnu
            sidecar_ext: ''
            tauri_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os_name == 'macos' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ matrix.os_name }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}

      - name: Install Linux deps
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf pkg-config

      - name: Install pkg (sidecar bundler)
        run: npm install -g @yao-pkg/pkg

      - name: Install Tauri CLI
        working-directory: apps/desktop
        run: npm install

      - name: Install frontend deps
        working-directory: apps/frontend
        run: npm install

      - name: Install backend deps
        working-directory: apps/backend
        run: npm install

      - name: Build backend bundle (esbuild CJS)
        working-directory: apps/backend
        run: |
          npm install --save-dev esbuild
          npm run build
          npx esbuild src/server.ts --bundle --platform=node --format=cjs \
            --target=node22 --outfile=dist/bundle.cjs \
            --external:bufferutil --external:utf-8-validate

      - name: Build sidecar binary (pkg)
        working-directory: apps/desktop
        run: |
          pkg ../backend/dist/bundle.cjs \
            --targets ${{ matrix.pkg_target }} \
            --output src-tauri/binaries/collab-backend-${{ matrix.triple }}${{ matrix.sidecar_ext }}

      - name: Build frontend (SvelteKit static)
        working-directory: apps/frontend
        run: npm run build

      - name: Build Tauri app
        working-directory: apps/desktop
        env:
          CARGO_HTTP_CHECK_REVOKE: false   # Windows SSL workaround
        run: |
          cd src-tauri
          cargo build --release --features custom-protocol ${{ matrix.tauri_target }}

      # ─── Windows : ZIP portable ──────────────────────────────────────
      - name: Pack Windows portable ZIP
        if: matrix.os_name == 'windows'
        shell: pwsh
        working-directory: apps/desktop/src-tauri/target/release
        run: |
          $out = "$env:GITHUB_WORKSPACE/Collab-Portable-x64.zip"
          # Tauri may name the binary collab-desktop.exe; copy to Collab.exe
          $src = if (Test-Path "collab-desktop.exe") { "collab-desktop.exe" } else { "Collab.exe" }
          [System.IO.File]::Copy($src, "Collab.exe", $true)
          Compress-Archive -Path "Collab.exe","collab-backend.exe" -DestinationPath $out -Force
          Get-Item $out | Format-Table Name, Length

      # ─── Linux : AppImage OR tarball ───────────────────────────────────
      - name: Pack Linux tarball
        if: matrix.os_name == 'linux'
        run: |
          cd apps/desktop/src-tauri/target/release
          # Tauri produces collab-desktop binary
          cp collab-desktop Collab
          tar -czf "$GITHUB_WORKSPACE/Collab-Portable-linux-x64.tar.gz" Collab collab-backend
          ls -lh "$GITHUB_WORKSPACE/Collab-Portable-linux-x64.tar.gz"

      # ─── macOS : tarball arm64 ─────────────────────────────────────────
      - name: Pack macOS tarball
        if: matrix.os_name == 'macos'
        run: |
          cd apps/desktop/src-tauri/target/aarch64-apple-darwin/release
          cp collab-desktop Collab
          tar -czf "$GITHUB_WORKSPACE/Collab-Portable-macos-arm64.tar.gz" Collab collab-backend
          ls -lh "$GITHUB_WORKSPACE/Collab-Portable-macos-arm64.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: collab-portable-${{ matrix.os_name }}
          path: Collab-Portable-*
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -name "Collab-Portable-*"

      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # Create release if missing (idempotent)
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
                 --title "Collab Desktop $TAG" \
                 --notes "Build CI automatique multi-OS (Windows x64, Linux x64, macOS arm64)."
          # Upload all artifacts found
          find artifacts -type f -name "Collab-Portable-*" -print0 | while IFS= read -r -d '' f; do
            gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber
          done
