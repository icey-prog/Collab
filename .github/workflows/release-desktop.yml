name: Release Desktop

on:
  push:
    tags:
      - 'v*-portable'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the release (ex: v1.0.1-portable)'
        required: true
        default: 'v1.0.1-portable'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os_name: windows
            triple: x86_64-pc-windows-msvc
            sidecar_ext: '.exe'
            tauri_target: ''
            release_dir: target/release
          - platform: macos-latest
            os_name: macos
            triple: aarch64-apple-darwin
            sidecar_ext: ''
            tauri_target: '--target aarch64-apple-darwin'
            release_dir: target/aarch64-apple-darwin/release
          - platform: ubuntu-22.04
            os_name: linux
            triple: x86_64-unknown-linux-gnu
            sidecar_ext: ''
            tauri_target: ''
            release_dir: target/release

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os_name == 'macos' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ matrix.os_name }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}

      - name: Install Linux system deps
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf pkg-config libfuse2

      - name: Install frontend deps
        working-directory: apps/frontend
        run: npm install

      - name: Install backend deps
        working-directory: apps/backend
        run: npm install

      - name: Install Tauri CLI deps
        working-directory: apps/desktop
        run: npm install

      # ── Bundle backend TypeScript → CJS unique via esbuild ────────────────
      - name: Bundle backend (esbuild CJS)
        working-directory: apps/backend
        shell: bash
        run: |
          npm install --save-dev esbuild
          npx esbuild src/server.ts \
            --bundle --platform=node --format=cjs --target=node20 \
            --outfile=dist/bundle.cjs \
            --external:bufferutil --external:utf-8-validate
          ls -lh dist/bundle.cjs

      # ── Sidecar : Node.js SEA (Single Executable Application) ─────────────
      # Le binaire node de la CI est copié puis le bundle y est injecté.
      # Le nom DOIT conserver le target-triple : Tauri v1 le cherche explicitement
      # au runtime (Command::new_sidecar → {exe_dir}/collab-backend-{triple}).
      - name: Build sidecar (Node.js SEA)
        shell: bash
        working-directory: apps/backend
        run: |
          TRIPLE="${{ matrix.triple }}"
          EXT="${{ matrix.sidecar_ext }}"
          BINDIR="$GITHUB_WORKSPACE/apps/desktop/src-tauri/binaries"

          # BUG FIX #2 : créer binaries/ s'il n'existe pas (gitignored, absent du checkout)
          mkdir -p "$BINDIR"

          OUT="${BINDIR}/collab-backend-${TRIPLE}${EXT}"

          # Écriture de la config SEA (printf évite le heredoc qui casse le YAML)
          printf '{"main":"dist/bundle.cjs","output":"sea-prep.blob","disableExperimentalSEAWarning":true}\n' \
            > sea-config.json

          node --experimental-sea-config sea-config.json

          # Copie du binaire node natif (même architecture que la CI)
          NODE_BIN="$(which node)"
          cp "$NODE_BIN" "$OUT"

          # macOS : supprimer la signature avant injection
          if [[ "${{ matrix.os_name }}" == "macos" ]]; then
            codesign --remove-signature "$OUT" 2>/dev/null || true
          fi

          # Injection du blob SEA
          MACHO_ARG=""
          if [[ "${{ matrix.os_name }}" == "macos" ]]; then
            MACHO_ARG="--macho-segment-name NODE_SEA"
          fi

          npx --yes postject "$OUT" NODE_SEA_BLOB sea-prep.blob \
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2 \
            $MACHO_ARG

          # macOS : ré-signature ad-hoc
          if [[ "${{ matrix.os_name }}" == "macos" ]]; then
            codesign --sign - "$OUT" 2>/dev/null || true
          fi

          chmod +x "$OUT" 2>/dev/null || true
          echo "=== Sidecar créé (avec triple) ==="
          ls -lh "$OUT"

      # ── Build frontend SvelteKit ───────────────────────────────────────────
      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      # ── Compilation Rust (cargo build) ────────────────────────────────────
      - name: Build Tauri app (cargo)
        working-directory: apps/desktop/src-tauri
        env:
          CARGO_HTTP_CHECK_REVOKE: false
        shell: bash
        run: |
          echo "=== Sidecar dans binaries/ avant cargo build ==="
          ls -lh "$GITHUB_WORKSPACE/apps/desktop/src-tauri/binaries/"
          cargo build --release --features custom-protocol ${{ matrix.tauri_target }}

      # ── Copie sidecar dans release dir (NOM AVEC TRIPLE conservé) ─────────
      # BUG FIX #1/#3 : Tauri v1 cherche {exe_dir}/collab-backend-{triple}[.exe]
      # Le nom sans triple est invisible pour le sidecar resolver.
      - name: Copy sidecar to release dir
        shell: bash
        run: |
          TRIPLE="${{ matrix.triple }}"
          EXT="${{ matrix.sidecar_ext }}"
          RELDIR="apps/desktop/src-tauri/${{ matrix.release_dir }}"
          SRC="apps/desktop/src-tauri/binaries/collab-backend-${TRIPLE}${EXT}"
          DEST="${RELDIR}/collab-backend-${TRIPLE}${EXT}"
          cp "$SRC" "$DEST"
          chmod +x "$DEST" 2>/dev/null || true
          echo "=== Sidecar dans release dir ==="
          ls -lh "$DEST"

      # ─── Linux : AppImage via linuxdeploy (webkit2gtk bundlé) ─────────────
      - name: Create AppImage (Linux)
        if: matrix.os_name == 'linux'
        shell: bash
        run: |
          TRIPLE="${{ matrix.triple }}"
          RELDIR="$GITHUB_WORKSPACE/apps/desktop/src-tauri/target/release"
          APPDIR="$GITHUB_WORKSPACE/Collab.AppDir"

          curl -fSL --retry 3 -o linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          # Binaire principal Tauri
          cp "$RELDIR/collab-desktop" "$APPDIR/usr/bin/collab"

          # BUG FIX #3 : conserver le triple pour que Tauri le trouve au runtime
          cp "$RELDIR/collab-backend-${TRIPLE}" "$APPDIR/usr/bin/collab-backend-${TRIPLE}"

          chmod +x "$APPDIR/usr/bin/"*

          cp "apps/desktop/src-tauri/icons/128x128.png" \
             "$APPDIR/usr/share/icons/hicolor/256x256/apps/collab.png"

          printf '[Desktop Entry]\nName=Collab\nExec=collab\nIcon=collab\nType=Application\nCategories=Network;\nVersion=1.0\n' \
            > "$APPDIR/collab.desktop"
          cp "$APPDIR/collab.desktop" "$APPDIR/usr/share/applications/"

          echo "=== Contenu AppDir/usr/bin/ ==="
          ls -lh "$APPDIR/usr/bin/"

          # Étape 1 : linuxdeploy bundle les .so via ldd (webkit2gtk-4.0 inclus)
          # Sans --output : peuple seulement l'AppDir, ne package pas encore
          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-x86_64.AppImage --appdir "$APPDIR"

          # Étape 2 : ajouter les binaires helpers webkit2gtk-4.0
          # libwebkit2gtk-4.0.so cherche WebKitNetworkProcess/WebKitWebProcess à un
          # chemin ABSOLU compilé en dur. Sans ces helpers dans l'AppImage, l'app
          # crashe sur Ubuntu 24.04 qui n'a que webkit2gtk-4.1.
          # WEBKIT_EXEC_PATH permet à webkit de les trouver dans l'AppImage.
          WEBKIT_SRC="/usr/lib/x86_64-linux-gnu/webkit2gtk-4.0"
          WEBKIT_DST="$APPDIR/usr/lib/x86_64-linux-gnu/webkit2gtk-4.0"
          mkdir -p "$WEBKIT_DST"
          for helper in WebKitNetworkProcess WebKitWebProcess WebKitGPUProcess; do
            [ -f "$WEBKIT_SRC/$helper" ] && \
              cp "$WEBKIT_SRC/$helper" "$WEBKIT_DST/$helper" && \
              chmod +x "$WEBKIT_DST/$helper" && \
              echo "Bundled: $helper"
          done
          [ -d "$WEBKIT_SRC/injected-bundle" ] && \
            cp -r "$WEBKIT_SRC/injected-bundle" "$WEBKIT_DST/"

          echo "=== Helpers webkit2gtk dans AppImage ==="
          ls -lh "$WEBKIT_DST/"

          # Étape 3 : injecter WEBKIT_EXEC_PATH dans l'AppRun généré par linuxdeploy
          sed -i '/^exec /i export WEBKIT_EXEC_PATH="${APPDIR}/usr/lib/x86_64-linux-gnu/webkit2gtk-4.0"' \
            "$APPDIR/AppRun"
          echo "=== AppRun (tail) ==="
          tail -5 "$APPDIR/AppRun"

          # Étape 4 : packager avec appimagetool
          curl -fSL --retry 3 -o appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool.AppImage \
            "$APPDIR" "$GITHUB_WORKSPACE/Collab-linux-x64.AppImage"

          ls -lh "$GITHUB_WORKSPACE/Collab-linux-x64.AppImage"

      # ─── Windows : ZIP portable ───────────────────────────────────────────
      # BUG FIX #1 : inclure le sidecar avec le triple dans le ZIP
      - name: Pack Windows ZIP
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          $triple = "${{ matrix.triple }}"
          $relDir = "apps\desktop\src-tauri\target\release"
          $out = "$env:GITHUB_WORKSPACE\Collab-Portable-x64.zip"

          # Renomme le binaire Tauri en Collab.exe pour l'utilisateur final
          $tauriBin = if (Test-Path "$relDir\collab-desktop.exe") {
            "$relDir\collab-desktop.exe"
          } else {
            "$relDir\Collab.exe"
          }

          # Sidecar avec triple (requis par Tauri v1 au runtime)
          $sidecar = "$relDir\collab-backend-$triple.exe"

          if (-not (Test-Path $sidecar)) {
            Write-Error "Sidecar introuvable : $sidecar"
            exit 1
          }

          # Assemblage dans un répertoire temporaire
          $tmpDir = "$env:GITHUB_WORKSPACE\_zip_tmp"
          New-Item -ItemType Directory -Force -Path $tmpDir | Out-Null
          Copy-Item $tauriBin "$tmpDir\Collab.exe"
          Copy-Item $sidecar "$tmpDir\collab-backend-$triple.exe"

          Compress-Archive -Path "$tmpDir\*" -DestinationPath $out -Force
          Remove-Item -Recurse -Force $tmpDir
          Write-Host "=== ZIP créé ==="
          Get-Item $out | Format-Table Name, Length

      # ─── macOS : tarball arm64 ────────────────────────────────────────────
      # BUG FIX #1 : inclure le sidecar avec le triple dans le tarball
      - name: Pack macOS tarball
        if: matrix.os_name == 'macos'
        shell: bash
        run: |
          TRIPLE="${{ matrix.triple }}"
          RELDIR="apps/desktop/src-tauri/target/aarch64-apple-darwin/release"
          OUT="$GITHUB_WORKSPACE/Collab-Portable-macos-arm64.tar.gz"

          SIDECAR="${RELDIR}/collab-backend-${TRIPLE}"
          if [ ! -f "$SIDECAR" ]; then
            echo "ERREUR : sidecar introuvable : $SIDECAR"
            exit 1
          fi

          cd "$RELDIR"
          cp collab-desktop Collab
          tar -czf "$OUT" Collab "collab-backend-${TRIPLE}"
          ls -lh "$OUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: collab-portable-${{ matrix.os_name }}
          path: |
            Collab-Portable-*
            Collab-linux-x64.AppImage
          retention-days: 7

  # ─── Publication GitHub Release ─────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or reuse GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
                 --title "Collab Desktop $TAG" \
                 --notes "Build CI multi-OS (Windows x64, Linux x64 AppImage, macOS arm64)."

      # BUG FIX #5 : process substitution au lieu de pipe pour catcher les erreurs
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          while IFS= read -r -d '' f; do
            echo "Upload : $f"
            gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber
          done < <(find artifacts -type f \( \
            -name "Collab-Portable-*" \
            -o -name "Collab-linux-x64.AppImage" \
          \) -print0)
