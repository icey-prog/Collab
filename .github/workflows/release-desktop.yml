name: Release Desktop

on:
  push:
    tags:
      - 'v*-portable'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the release (ex: v1.1.0-portable)'
        required: true
        default: 'v1.1.0-portable'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os_name: windows
            triple: x86_64-pc-windows-msvc
            tauri_target: ''
            release_dir: target/release
          - platform: macos-latest
            os_name: macos
            triple: aarch64-apple-darwin
            tauri_target: '--target aarch64-apple-darwin'
            release_dir: target/aarch64-apple-darwin/release
          - platform: ubuntu-22.04
            os_name: linux
            triple: x86_64-unknown-linux-gnu
            tauri_target: ''
            release_dir: target/release

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os_name == 'macos' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ matrix.os_name }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}

      - name: Install Linux system deps
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf pkg-config libfuse2

      - name: Install frontend deps
        working-directory: apps/frontend
        run: npm install

      - name: Install Tauri CLI deps
        working-directory: apps/desktop
        run: npm install

      # ── Build frontend SvelteKit avec URL du VPS bakée ───────────────────────
      # VITE_API_URL doit être dans GitHub Secrets → Settings → Secrets → Actions
      - name: Build frontend
        working-directory: apps/frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_PUBLIC_URL: ${{ secrets.VITE_PUBLIC_URL }}
        run: npm run build

      # ── Linux : tauri build --bundles appimage ────────────────────────────────
      - name: Build Tauri AppImage (Linux)
        if: matrix.os_name == 'linux'
        working-directory: apps/desktop
        env:
          CARGO_HTTP_CHECK_REVOKE: false
          TAURI_PRIVATE_KEY: dummy
          TAURI_KEY_PASSWORD: dummy
        shell: bash
        run: |
          npx tauri build --bundles appimage
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          echo "AppImage : $APPIMAGE"
          cp "$APPIMAGE" "$GITHUB_WORKSPACE/Collab-linux-x64.AppImage"
          ls -lh "$GITHUB_WORKSPACE/Collab-linux-x64.AppImage"

      # ── Windows + macOS : cargo build --release ────────────────────────────
      - name: Build Tauri app (Windows/macOS)
        if: matrix.os_name != 'linux'
        working-directory: apps/desktop/src-tauri
        env:
          CARGO_HTTP_CHECK_REVOKE: false
        shell: bash
        run: cargo build --release --features custom-protocol ${{ matrix.tauri_target }}

      # ─── Windows : ZIP portable ───────────────────────────────────────────
      - name: Pack Windows ZIP
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          $relDir = "apps\desktop\src-tauri\target\release"
          $out = "$env:GITHUB_WORKSPACE\Collab-Portable-x64.zip"

          $tauriBin = if (Test-Path "$relDir\collab-desktop.exe") {
            "$relDir\collab-desktop.exe"
          } else {
            "$relDir\Collab.exe"
          }

          $tmpDir = "$env:GITHUB_WORKSPACE\_zip_tmp"
          New-Item -ItemType Directory -Force -Path $tmpDir | Out-Null
          Copy-Item $tauriBin "$tmpDir\Collab.exe"

          Compress-Archive -Path "$tmpDir\*" -DestinationPath $out -Force
          Remove-Item -Recurse -Force $tmpDir
          Write-Host "=== ZIP créé ==="
          Get-Item $out | Format-Table Name, Length

      # ─── macOS : tarball arm64 ────────────────────────────────────────────
      - name: Pack macOS tarball
        if: matrix.os_name == 'macos'
        shell: bash
        run: |
          RELDIR="apps/desktop/src-tauri/target/aarch64-apple-darwin/release"
          OUT="$GITHUB_WORKSPACE/Collab-Portable-macos-arm64.tar.gz"
          cd "$RELDIR"
          cp collab-desktop Collab
          tar -czf "$OUT" Collab
          ls -lh "$OUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: collab-portable-${{ matrix.os_name }}
          path: |
            Collab-Portable-*
            Collab-linux-x64.AppImage
          retention-days: 7

  # ─── Publication GitHub Release ─────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or reuse GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
                 --title "Collab Desktop $TAG" \
                 --notes "Build CI multi-OS (Windows x64, Linux x64 AppImage, macOS arm64). Backend cloud-first — nécessite connexion internet."

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          while IFS= read -r -d '' f; do
            echo "Upload : $f"
            gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber
          done < <(find artifacts -type f \( \
            -name "Collab-Portable-*" \
            -o -name "Collab-linux-x64.AppImage" \
          \) -print0)
