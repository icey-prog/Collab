name: Release Desktop

on:
  push:
    tags:
      - 'v*-portable'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the release (ex: v1.0.1-portable)'
        required: true
        default: 'v1.0.1-portable'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os_name: windows
            triple: x86_64-pc-windows-msvc
            sidecar_ext: '.exe'
            tauri_target: ''
            release_dir: target/release
          - platform: macos-latest
            os_name: macos
            triple: aarch64-apple-darwin
            sidecar_ext: ''
            tauri_target: '--target aarch64-apple-darwin'
            release_dir: target/aarch64-apple-darwin/release
          - platform: ubuntu-22.04
            os_name: linux
            triple: x86_64-unknown-linux-gnu
            sidecar_ext: ''
            tauri_target: ''
            release_dir: target/release

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os_name == 'macos' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ matrix.os_name }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}

      - name: Install Linux system deps
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf pkg-config libfuse2

      - name: Install frontend deps
        working-directory: apps/frontend
        run: npm install

      - name: Install backend deps
        working-directory: apps/backend
        run: npm install

      - name: Install Tauri CLI deps
        working-directory: apps/desktop
        run: npm install

      # ── Bundle backend TypeScript → CJS unique via esbuild ────────────
      - name: Bundle backend (esbuild CJS)
        working-directory: apps/backend
        shell: bash
        run: |
          npm install --save-dev esbuild
          npx esbuild src/server.ts \
            --bundle --platform=node --format=cjs --target=node20 \
            --outfile=dist/bundle.cjs \
            --external:bufferutil --external:utf-8-validate
          ls -lh dist/bundle.cjs

      # ── Sidecar : Node.js SEA (Single Executable Application) ─────────
      # Pas de téléchargement externe — on injecte le bundle dans le binaire
      # node de la CI. Fonctionne sur Linux, Windows et macOS nativement.
      - name: Build sidecar (Node.js SEA)
        shell: bash
        working-directory: apps/backend
        run: |
          TRIPLE="${{ matrix.triple }}"
          EXT="${{ matrix.sidecar_ext }}"
          BINDIR="$GITHUB_WORKSPACE/apps/desktop/src-tauri/binaries"
          OUT="${BINDIR}/collab-backend-${TRIPLE}${EXT}"

          # Config SEA
          cat > sea-config.json << 'EOF'
          {
            "main": "dist/bundle.cjs",
            "output": "sea-prep.blob",
            "disableExperimentalSEAWarning": true
          }
          EOF

          node --experimental-sea-config sea-config.json

          # Copie du binaire node natif (même architecture que la CI)
          NODE_BIN="$(which node || where node 2>/dev/null | head -1)"
          cp "$NODE_BIN" "$OUT"

          # macOS : supprimer la signature avant injection
          if [[ "${{ matrix.os_name }}" == "macos" ]]; then
            codesign --remove-signature "$OUT" 2>/dev/null || true
          fi

          # Injection du blob SEA
          MACHO_ARG=""
          if [[ "${{ matrix.os_name }}" == "macos" ]]; then
            MACHO_ARG="--macho-segment-name NODE_SEA"
          fi

          npx --yes postject "$OUT" NODE_SEA_BLOB sea-prep.blob \
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2 \
            $MACHO_ARG

          # macOS : ré-signature ad-hoc
          if [[ "${{ matrix.os_name }}" == "macos" ]]; then
            codesign --sign - "$OUT" 2>/dev/null || true
          fi

          chmod +x "$OUT" 2>/dev/null || true

          echo "=== Sidecar créé ==="
          ls -lh "$OUT"
          echo "=== Test rapide ==="
          "$OUT" --version 2>&1 | head -3 || true

      # ── Build frontend SvelteKit ───────────────────────────────────────
      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      # ── Compilation Rust (cargo build, tous OS) ────────────────────────
      - name: Build Tauri app (cargo)
        working-directory: apps/desktop/src-tauri
        env:
          CARGO_HTTP_CHECK_REVOKE: false
        shell: bash
        run: |
          echo "=== Vérification sidecar avant cargo build ==="
          ls -lh "$GITHUB_WORKSPACE/apps/desktop/src-tauri/binaries/"
          cargo build --release --features custom-protocol ${{ matrix.tauri_target }}

      # ── Copie sidecar dans release dir ────────────────────────────────
      - name: Copy sidecar to release dir
        shell: bash
        run: |
          SRC="apps/desktop/src-tauri/binaries/collab-backend-${{ matrix.triple }}${{ matrix.sidecar_ext }}"
          DEST="apps/desktop/src-tauri/${{ matrix.release_dir }}/collab-backend${{ matrix.sidecar_ext }}"
          cp "$SRC" "$DEST"
          chmod +x "$DEST" 2>/dev/null || true
          ls -lh "$DEST"

      # ─── Linux : AppImage via linuxdeploy (bundle webkit) ─────────────
      - name: Create AppImage (Linux)
        if: matrix.os_name == 'linux'
        shell: bash
        run: |
          RELDIR="$GITHUB_WORKSPACE/apps/desktop/src-tauri/target/release"
          APPDIR="$GITHUB_WORKSPACE/Collab.AppDir"

          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-gtk/releases/download/continuous/linuxdeploy-plugin-gtk-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          cp "$RELDIR/collab-desktop" "$APPDIR/usr/bin/collab"
          cp "$RELDIR/collab-backend"  "$APPDIR/usr/bin/"
          chmod +x "$APPDIR/usr/bin/"*

          cp "apps/desktop/src-tauri/icons/128x128.png" \
             "$APPDIR/usr/share/icons/hicolor/256x256/apps/collab.png"

          cat > "$APPDIR/collab.desktop" << 'DESKTOP'
[Desktop Entry]
Name=Collab
Exec=collab
Icon=collab
Type=Application
Categories=Network;
Version=1.0
DESKTOP
          cp "$APPDIR/collab.desktop" "$APPDIR/usr/share/applications/"

          APPIMAGE_EXTRACT_AND_RUN=1 DEPLOY_GTK_VERSION=3 \
            ./linuxdeploy-x86_64.AppImage \
              --appdir "$APPDIR" \
              --plugin gtk \
              --output appimage

          mv Collab*.AppImage "$GITHUB_WORKSPACE/Collab-linux-x64.AppImage"
          chmod +x "$GITHUB_WORKSPACE/Collab-linux-x64.AppImage"
          ls -lh "$GITHUB_WORKSPACE/Collab-linux-x64.AppImage"

      # ─── Windows : ZIP portable ───────────────────────────────────────
      - name: Pack Windows ZIP
        if: matrix.os_name == 'windows'
        shell: pwsh
        working-directory: apps/desktop/src-tauri/target/release
        run: |
          $out = "$env:GITHUB_WORKSPACE/Collab-Portable-x64.zip"
          $src = if (Test-Path "collab-desktop.exe") { "collab-desktop.exe" } else { "Collab.exe" }
          Copy-Item $src "Collab.exe" -Force
          Compress-Archive -Path "Collab.exe","collab-backend.exe" -DestinationPath $out -Force
          Get-Item $out | Format-Table Name, Length

      # ─── macOS : tarball arm64 ────────────────────────────────────────
      - name: Pack macOS tarball
        if: matrix.os_name == 'macos'
        run: |
          cd apps/desktop/src-tauri/target/aarch64-apple-darwin/release
          cp collab-desktop Collab
          tar -czf "$GITHUB_WORKSPACE/Collab-Portable-macos-arm64.tar.gz" Collab collab-backend
          ls -lh "$GITHUB_WORKSPACE/Collab-Portable-macos-arm64.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: collab-portable-${{ matrix.os_name }}
          path: |
            Collab-Portable-*
            Collab-linux-x64.AppImage
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f \( -name "Collab-Portable-*" -o -name "Collab-linux-x64.AppImage" \)

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
                 --title "Collab Desktop $TAG" \
                 --notes "Build CI multi-OS (Windows x64, Linux x64 AppImage, macOS arm64)."
          find artifacts -type f \( -name "Collab-Portable-*" -o -name "Collab-linux-x64.AppImage" \) -print0 \
            | while IFS= read -r -d '' f; do
              gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber
            done
